<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Color Scheme Switcher</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <h1>Color Scheme Switcher</h1>

    <div class="buttons">
      <button class="btn orange" id="orange"></button>
      <button class="btn black" id="black"></button>
      <button class="btn blue" id="blue"></button>
      <button class="btn green" id="green"></button>
    </div>

    <h2>
      Try clicking one of the colors above
      <span>to change background color!</span>
    </h2>

  </div>

  <script src="script.js"></script>
</body>
</html>
