<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator</title>
</head>
<body>
    <div class="container">
        <h1>BMI Calculator</h1>
        <form>
            <p><label for="weight">Weight (kg):</label></p>
            <p><input type="number" id="weight" name="weight" step="0.1" required></p>
            <p><label for="height">Height (Cm):</label></p>
            <p><input type="number" id="height" name="height" step="0.01" required></p>
            <button type="button">Calculate BMI</button>
            <div id="result"></div>
            <div id ="weight-guide">
                <h2>Weight Guide</h2>
                <p>Underweight: BMI less than 18.5</p>
                <p>Normal weight: BMI 18.5 - 24.9</p>
                <p>Overweight: BMI 25 - 29.9</p>
                <p>Obesity: BMI 30 or greater</p>
            </div>

        </form>
    </div>
</body>
</html>
