<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link rel="stylesheet" href="style.css">
    <title>BMI Calculator</title>
</head>
<body>
    <div class="container">
        <h1>BMI Calculator</h1>
        <form>
            <p><label>Weight (kg):</label>
            <input type="text" id="weight" ></p>
            <p><label >Height (Cm):</label>
            <input type="text" id="height"></p>
            <button>Calculate BMI</button>
            <div id="result"></div>
            <div id ="weight-guide">
                <h2>Weight Guide</h2>
                <p>Underweight: BMI less than 18.5</p>
                <p>Normal weight: BMI 18.5 - 24.9</p>
                <p>Overweight: BMI 25 - 29.9</p>
                <p>Obesity: BMI 30 or greater</p>
            </div>

        </form>
    </div>
</body>
<script src="script.js"></script>
</html>
