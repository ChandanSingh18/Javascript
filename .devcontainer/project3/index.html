<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clock</title>
    <style>
        body{
            margin: 0;
            font-family: system-ui, sans-serif;
            background-color: #212121;
            color: #fff;
        }

        .center {
            display: flex;
            height: 100vh;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
        }

        #banner {
            font-size: 18px;
            letter-spacing: 1px;
            opacity: 0.85;
        }

        #clock{
            font-size: 48px;
            background-color: orange;
            padding: 20px 50px;
            margin-top: 15px;
            border-radius: 12px;
            min-width: 220px;
        }
    </style>
</head>
<body>
   <div class="center">

    <div id="banner"><span>Your local time</span></div>
    <div id="clock"></div>
   </div> 
   <script src="script.js"></script>
</body>
</html>
